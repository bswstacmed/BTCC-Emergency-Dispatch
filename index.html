<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Tide Coastal Consulting Emergency Dispatch</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Our CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container-fluid p-0">

    <div class="bg-primary text-white text-center p-4">
        <h1>Blue Tide Coastal Consulting Emergency Dispatch</h1>
        <p class="mb-0">Version 1.0</p>
    </div>

    <div class="container mt-5">

        <div class="card shadow">

            <div class="card-body">

                <h3>Dispatcher Login</h3>

                <p>Enter Dispatcher PIN</p>

                <input
                    type="password"
                    id="pin"
                    class="form-control"
                    placeholder="Dispatcher PIN">

                <button
                    class="btn btn-primary mt-3 w-100">
                    Login
                </button>

            </div>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script src="app.js"></script>

</body>
</html>
